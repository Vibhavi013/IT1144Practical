<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyShop · Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">Trendy<span class="light">Shop</span></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="checkout.html" class="active">Checkout</a>
            </div>
            <div class="nav-actions">
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
                <button class="cart-btn" onclick="openCart()">🛒 <span id="cartCount">0</span></button>
            </div>
        </nav>

        <section class="hero">
            <h1>Checkout</h1>
            <p>Review your order and complete purchase.</p>
        </section>

        <div class="checkout-section">
            <div class="order-summary">
                <h2>Order Summary</h2>
                <ul id="checkoutList"></ul>
                <div class="checkout-total">
                    <strong>Total: $<span id="checkoutTotal">0.00</span></strong>
                </div>
            </div>

            <div class="checkout-form">
                <h2>Shipping Details</h2>
                <form id="orderForm" onsubmit="placeOrder(event)">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name"  placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <input type="text" id="address"  placeholder="Enter your address">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone"  placeholder="Enter your phone number">
                    </div>
                    <button type="submit" class="btn-place-order">Place Order</button>
                </form>
            </div>
        </div>

        
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-panel">
            <h3>Your Cart</h3>
            <ul id="cartList"></ul>
            <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
            <div class="cart-actions">
                <button onclick="closeCart()">Close</button>
                <button onclick="goToCheckout()">Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
